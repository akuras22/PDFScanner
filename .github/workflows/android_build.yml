name: Build And Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
            VERSION_NAME="${TAG#v}"
            VERSION_CODE=$(echo $VERSION_NAME | cut -d. -f1,2,3 | tr -d '.')
          else
            VERSION_NAME="1.0.${{ github.run_number }}"
            VERSION_CODE="${{ github.run_number }}"
            TAG="v${VERSION_NAME}"
          fi
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore if available
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "HAS_KEYSTORE=true" >> $GITHUB_ENV
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV

      - name: Build release APK
        run: |
          if [ "$HAS_KEYSTORE" = "true" ]; then
            ./gradlew :app:assembleRelease \
              -PCI_VERSION_CODE=${{ steps.version.outputs.version_code }} \
              -PCI_VERSION_NAME=${{ steps.version.outputs.version_name }} \
              -PRELEASE_STORE_FILE=$KEYSTORE_PATH \
              -PRELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
              -PRELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }} \
              -PRELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          else
            ./gradlew :app:assembleRelease \
              -PCI_VERSION_CODE=${{ steps.version.outputs.version_code }} \
              -PCI_VERSION_NAME=${{ steps.version.outputs.version_name }}
          fi

      - name: Publish GitHub release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PDFScanner ${{ steps.version.outputs.version_name }}
          body: |
            ## PDFScanner ${{ steps.version.outputs.version_name }}
            
            Auto-generated release from commit ${{ github.sha }}
            
            **Version Info**
            - Version code: ${{ steps.version.outputs.version_code }}
            - Version name: ${{ steps.version.outputs.version_name }}
            - Triggered by: ${{ github.event_name }}
            
            ### Installation
            Download the APK and install it on your Android device.
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/app-release.apk

