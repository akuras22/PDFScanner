name: Build And Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        # This builds the 'unsigned' version first
        run: ./gradlew :app:assembleRelease

      - name: Sign APK
        # We use this action because it handles the zipalign/Android 14 tools better
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        if: secrets.SIGNING_KEY != ''
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          # Required for Android 14 support
          BUILD_TOOLS_VERSION: "34.0.0" 

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # This uses the signed APK if signing worked, otherwise the unsigned one
          files: ${{ steps.sign_app.outputs.signedReleaseFile || 'app/build/outputs/apk/release/app-release-unsigned.apk' }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}