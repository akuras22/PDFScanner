name: Build And Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease -PCI_VERSION_CODE=${{ github.run_number }} -PCI_VERSION_NAME=1.0.${{ github.run_number }}

      - name: Resolve release metadata
        id: meta
        run: |
          TAG="v1.0.${{ github.run_number }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=PDFScanner ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            Auto-generated release from commit ${{ github.sha }}

            Version code: ${{ github.run_number }}
            Version name: 1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/app-release.apk
